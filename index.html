<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaudeProject Games</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e1016;
    color: #f0f0f0;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  .wrap {
    text-align: center;
    max-width: 480px;
    width: 100%;
    padding: 0 20px;
  }
  h1 {
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  a.card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1e1f26;
    border: 3px solid #333844;
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    color: #f0f0f0;
    text-align: left;
    transition: border-color 0.15s;
  }
  a.card:hover {
    border-color: #ffb347;
  }
  .card .icon {
    font-size: 40px;
  }
  .card h2 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  .card p {
    margin: 0;
    font-size: 13px;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ClaudeProject Games</h1>
    <div class="cards">
      <a class="card" href="astro-blast/index.html">
        <span class="icon">&#128163;</span>
        <span>
          <h2>Astro Blast</h2>
          <p>Drop bombs to clear bricks and take out wandering aliens.</p>
        </span>
      </a>
      <a class="card" href="snake-game/index.html">
        <span class="icon">&#128013;</span>
        <span>
          <h2>Snake</h2>
          <p>The classic — grow your snake, don't hit the walls or yourself.</p>
        </span>
      </a>
    </div>
  </div>
</body>
</html>
