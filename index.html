<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaudeProject Games</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    margin: 0;
    background: #0e1016;
    color: #f0f0f0;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  #menu-view {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #menu-view.hidden {
    display: none;
  }
  .wrap {
    text-align: center;
    max-width: 480px;
    width: 100%;
    padding: 0 20px;
  }
  h1 {
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  button.card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1e1f26;
    border: 3px solid #333844;
    border-radius: 10px;
    padding: 18px 20px;
    color: #f0f0f0;
    text-align: left;
    font: inherit;
    cursor: pointer;
    transition: border-color 0.15s;
    width: 100%;
  }
  button.card:hover,
  button.card:focus-visible {
    border-color: #ffb347;
  }
  .card .icon {
    font-size: 40px;
  }
  .card h2 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  .card p {
    margin: 0;
    font-size: 13px;
    color: #aaa;
  }
  #game-view {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #game-view.active {
    display: flex;
  }
  #back-btn {
    flex: 0 0 auto;
    margin: 10px;
    align-self: flex-start;
    background: #1e1f26;
    border: 2px solid #333844;
    border-radius: 8px;
    color: #f0f0f0;
    font: inherit;
    font-size: 14px;
    padding: 8px 14px;
    cursor: pointer;
  }
  #back-btn:hover {
    border-color: #ffb347;
  }
  #game-frame {
    flex: 1 1 auto;
    width: 100%;
    border: none;
  }
</style>
</head>
<body>
  <div id="menu-view">
    <div class="wrap">
      <h1>ClaudeProject Games</h1>
      <div class="cards">
        <button type="button" class="card" data-src="astro-blast/index.html">
          <span class="icon">&#128163;</span>
          <span>
            <h2>Astro Blast</h2>
            <p>Drop bombs to clear bricks and take out wandering aliens.</p>
          </span>
        </button>
        <button type="button" class="card" data-src="snake-game/index.html">
          <span class="icon">&#128013;</span>
          <span>
            <h2>Snake</h2>
            <p>The classic — grow your snake, don't hit the walls or yourself.</p>
          </span>
        </button>
      </div>
    </div>
  </div>

  <div id="game-view">
    <button type="button" id="back-btn">&#8249; Menu</button>
    <iframe id="game-frame" title="Game"></iframe>
  </div>

  <script>
    const menuView = document.getElementById("menu-view");
    const gameView = document.getElementById("game-view");
    const gameFrame = document.getElementById("game-frame");
    const backBtn = document.getElementById("back-btn");

    document.querySelectorAll(".card").forEach((btn) => {
      btn.addEventListener("click", () => {
        gameFrame.src = btn.dataset.src;
        menuView.classList.add("hidden");
        gameView.classList.add("active");
      });
    });

    backBtn.addEventListener("click", () => {
      gameFrame.src = "about:blank";
      gameView.classList.remove("active");
      menuView.classList.remove("hidden");
    });
  </script>
</body>
</html>
