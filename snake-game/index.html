<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <h1>Snake</h1>
    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
    <canvas id="board" width="400" height="400"></canvas>
    <p class="hint">Arrow keys / WASD to move &middot; Space to pause &middot; Enter to restart</p>
    <div id="overlay" class="overlay">
      <p id="overlay-text">Press any arrow key to start</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
